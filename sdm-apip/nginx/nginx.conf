# =============================================
# NGINX REVERSE PROXY - SDM APIP PRODUCTION
# Handles SSL termination, HTTP→HTTPS redirect,
# and proxying to frontend & backend containers.
# =============================================

# ─── RATE LIMITING ────────────────────────────
# Batasi request untuk mencegah abuse
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ─── HTTP → HTTPS REDIRECT ────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # Allow Let's Encrypt challenge (wajib untuk certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect semua HTTP ke HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS SERVER ─────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # ── SSL Certificate (Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;

    # ── SSL Security Settings ──
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:MozSSL:10m;
    ssl_session_tickets       off;

    # ── OCSP Stapling (mempercepat handshake SSL) ──
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:" always;

    # ── Sembunyikan versi Nginx ──
    server_tokens off;

    # ── Batas ukuran upload (untuk import Excel) ──
    client_max_body_size 20M;

    # ─── FRONTEND ─────────────────────────────────
    location / {
        proxy_pass         http://sdm_apip_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass         http://sdm_apip_frontend:80;
            proxy_cache_valid  200 30d;
            add_header         Cache-Control "public, max-age=2592000, immutable";
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        }
    }

    # ─── BACKEND API ──────────────────────────────
    location /api/ {
        # Rate limiting untuk endpoint API
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass         http://sdm_apip_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # ─── EXTRA RATE LIMIT untuk endpoint LOGIN ────
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass         http://sdm_apip_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── ERROR PAGES ──────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        return 502 '{"error": "Server sedang tidak tersedia. Silakan coba lagi nanti."}';
        add_header Content-Type application/json;
    }
}
