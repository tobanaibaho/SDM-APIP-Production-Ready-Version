server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # index.html — JANGAN PERNAH di-cache agar browser selalu mendapat hash bundle JS terbaru
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Melayani file statis (fallback SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Aset JS/CSS/lainnya yang di-hash — aman untuk di-cache selamanya (Vite menambahkan hash konten ke nama file)
    location ~* \.(js|mjs)$ {
        root /usr/share/nginx/html;
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.css$ {
        root /usr/share/nginx/html;
        add_header Content-Type "text/css; charset=utf-8" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ----------------------------------------------------------------------
    # KONFIGURASI SSL (HTTPS) - WAJIB UNTUK OIDC/SSO DI PRODUKSI
    # Buka komentar di bawah ini jika Nginx ini menangani SSL secara langsung:
    # 
    # listen 443 ssl;
    # ssl_certificate /etc/nginx/ssl/kemenko-infra.crt;
    # ssl_certificate_key /etc/nginx/ssl/kemenko-infra.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ----------------------------------------------------------------------

    # Meneruskan permintaan API ke backend
    location /api {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Paksa backend mengenali koneksi sebagai HTTPS (Sangat penting untuk keamanan cookie SSO)
        proxy_set_header X-Forwarded-Proto "https";
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
