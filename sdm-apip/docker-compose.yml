services:
  postgres:
    image: postgres:15-alpine
    container_name: sdm_apip_db
    environment:
      POSTGRES_USER: ${DB_USER:-sdm_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sdm_secure_password_2024}
      POSTGRES_DB: ${DB_NAME:-sdm_apip_db}
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-sdm_admin} -d ${DB_NAME:-sdm_apip_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: sdm_apip_backend
    environment:
      - TZ=Asia/Jakarta
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-sdm_admin}
      - DB_PASSWORD=${DB_PASSWORD:-sdm_secure_password_2024}
      - DB_NAME=${DB_NAME:-sdm_apip_db}
      - GIN_MODE=release
      # KRITIS: JWT_SECRET WAJIB diatur di environment sebelum deployment.
      # Tidak ada default — server akan menolak untuk menyala jika hilang di mode rilis.
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SERVER_PORT=8080
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-SDM APIP System}
      - FRONTEND_URL=${FRONTEND_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      # Password bootstrap admin — wajib diatur sebelum dijalankan pertama kali di production
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD}
      - LOG_FILE_PATH=logs/app.log
      # Konfigurasi SSO
      - SSO_ENABLED=${SSO_ENABLED:-false}
      - SSO_CLIENT_ID=${SSO_CLIENT_ID}
      - SSO_CLIENT_SECRET=${SSO_CLIENT_SECRET}
      - SSO_ISSUER_URL=${SSO_ISSUER_URL}
      - SSO_REDIRECT_URL=${SSO_REDIRECT_URL}
      # SSO Google
      - GOOGLE_SSO_ENABLED=${GOOGLE_SSO_ENABLED:-false}
      - GOOGLE_SSO_CLIENT_ID=${GOOGLE_SSO_CLIENT_ID}
      - GOOGLE_SSO_CLIENT_SECRET=${GOOGLE_SSO_CLIENT_SECRET}
      - GOOGLE_SSO_ISSUER_URL=${GOOGLE_SSO_ISSUER_URL}
      - GOOGLE_SSO_REDIRECT_URL=${GOOGLE_SSO_REDIRECT_URL}
      # SSO Microsoft
      - MICROSOFT_SSO_ENABLED=${MICROSOFT_SSO_ENABLED:-false}
      - MICROSOFT_SSO_CLIENT_ID=${MICROSOFT_SSO_CLIENT_ID}
      - MICROSOFT_SSO_CLIENT_SECRET=${MICROSOFT_SSO_CLIENT_SECRET}
      - MICROSOFT_SSO_ISSUER_URL=${MICROSOFT_SSO_ISSUER_URL}
      - MICROSOFT_SSO_REDIRECT_URL=${MICROSOFT_SSO_REDIRECT_URL}
    ports:
      - "8080:8080"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      # Gunakan Dockerfile.prebuilt jika npm install gagal karena masalah network.
      # Pastikan sudah menjalankan 'npm run build' lokal terlebih dahulu.
      # dockerfile: Dockerfile.prebuilt
      dockerfile: Dockerfile
    container_name: sdm_apip_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_logs:
